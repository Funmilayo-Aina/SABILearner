<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SABI Learner</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
    <header>
        <h1>SABI Learner</h1>
    </header>
    <main>
        <!--learning section -->

        <section>
            <h2>About SABI Learner</h2>
            <p>SABI Learner is an intelligent adaptive learning platform designed to provide personalized learning experiences for young learners.</p>
        
        <p id = "question"> Start</p>
        <input type="number" id="answer" placeholder="Type your answer here">
        
        <div class="buttons">
            <button onclick="startSession()">Start Session</button>
            <button onclick="submitAnswer()">Submit Answer</button>
        </div>
        <p id="feedback"></p>

        <p id="skill"></p>
        <p id="level"></p>
        <p id="knowledge"></p>
        </section>
          <!--- Learning Progress-->
            <section>
                <h2>Learning Progress</h2>
                <canvas id ="chart"></canvas>
                <button onclick="loadProgress()">Refresh</button>

             <!-- insight-->
           <section>
                <h2>Facilitator Insights</h2>
                <button onclick="loadInsight()">View Progress</button>
                <ul id="insightsList"></ul> 
                <p id="summary"></p> 
        </section>

        
    </main>
    <footer>
        <p>&copy; 2023 SABI Learner. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
